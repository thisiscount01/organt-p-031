<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineAI — AI 영화 추천 퀴즈 게임</title>
  <meta name="description" content="500편 TMDB 영화 기반 AI 맞춤 추천 · 영화 퀴즈 배틀 · 커뮤니티">

  <!-- Icons (local vendor) -->
  <link rel="stylesheet" href="/vendor/css/all.min.css">

  <!-- Bootstrap 5.3 (local vendor) -->
  <link rel="stylesheet" href="/vendor/css/bootstrap.min.css">

  <!-- Custom Theme (overrides Bootstrap where needed) -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
  <!-- Cold-start splash: Vue 마운트 전 즉시 표시, 마운트 후 자동 교체됨 -->
  <div id="cold-splash" style="position:fixed;inset:0;background:#0d0d1a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:'Noto Sans KR',sans-serif;">
    <div style="font-size:2.4rem;font-weight:900;letter-spacing:-1px;margin-bottom:1rem;">
      <span style="color:#e50914;">Cine</span><span style="color:#fff;">AI</span>
    </div>
    <p style="color:#aaa;font-size:0.95rem;margin-bottom:1.8rem;">AI 기반 영화 추천 · 퀴즈 · 커뮤니티</p>
    <div style="width:200px;height:4px;background:#222;border-radius:2px;overflow:hidden;">
      <div style="height:100%;background:linear-gradient(90deg,#e50914,#ff6b6b);animation:cld 2s ease-in-out infinite;border-radius:2px;"></div>
    </div>
    <p style="color:#666;font-size:0.8rem;margin-top:1.2rem;">서버를 시작하는 중입니다 (최초 접속 시 30초 내외)</p>
    <style>@keyframes cld{0%{width:0;transform:translateX(0)}60%{width:80%}100%{width:100%;transform:translateX(200px)}}</style>
  </div>
</div>

  <!-- Vue 3 (local vendor) -->
  <script src="/vendor/js/vue.global.prod.js"></script>

  <!-- Axios (local vendor) -->
  <script src="/vendor/js/axios.min.js"></script>

  <!-- Bootstrap 5.3 JS (local vendor) -->
  <script src="/vendor/js/bootstrap.bundle.min.js"></script>

  <!-- App Scripts (load order matters) -->
  <script src="/js/quiz-engine.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/pages.js"></script>
  <script src="/js/pages-ext.js"></script>
  <script src="/js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
